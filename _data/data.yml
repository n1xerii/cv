career-profile:
    title: Minä
    summary: |
      Hei! Nimeni on Niklas, olen intohimoinen, motivoitunut ja luova tekijä, ja olen erittäin kiinnostunut tietokoneista ja etenkin ohjelmoinnista. Kiinnostuksieni kautta opiskelin Ohjelmistökehittäjäksi ja valmistuin vuonna 2025. Rakastan ideointia, oppimista, uusien asioiden luomista ja syvällistä ajattelua, ja olen kiinnostunut sovellusten ja etenkin pelien kehityksestä. Julkiset projektini löytyvät Github profiilistani.
   
